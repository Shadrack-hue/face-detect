<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>AI Face Detection System | Eng. Shadrack Favour</title>
    <meta name="theme-color" content="#0f172a" />
</head>
<body>
    <div class="app-layout">
        <!-- Header -->
        <header class="glass-panel">
            <div class="brand">
                <h1>IntelStream AI</h1>
                <p>Vision Core v3.0 &bull; <strong>Eng. Shadrack Favour</strong></p>
            </div>
            <div class="header-actions">
                <button id="btn-fullscreen" class="btn-icon" title="Toggle Fullscreen">
                    <i data-lucide="maximize"></i>
                </button>
            </div>
        </header>

        <!-- Main Workspace -->
        <main class="workspace">
            <!-- Left Sidebar: Controls -->
            <aside class="sidebar glass-panel">
                <div class="section-title">Camera Controls</div>
                <div class="control-grid">
                    <button id="btn-toggle-ai" class="btn-primary active">
                        <i data-lucide="cpu"></i> <span id="ai-status-text">AI Active</span>
                    </button>
                    <button id="btn-flip-cam" class="btn-secondary">
                        <i data-lucide="switch-camera"></i> Flip
                    </button>
                    <button id="btn-capture" class="btn-secondary">
                        <i data-lucide="camera"></i> Capture
                    </button>
                </div>
                
                <div class="settings-group">
                    <label for="cam-select">Video Source</label>
                    <select id="cam-select" class="select-input">
                        <option value="">Detecting cameras...</option>
                    </select>
                </div>

                <div class="settings-group">
                    <label for="zoom-slider">Zoom + - </label>
                    <input type="range" id="zoom-slider" min="1" max="3" step="0.1" value="1" disabled />
                </div>
            </aside>

            <!-- Center: Video Stage -->
            <div class="video-stage glass-panel">
                <div class="video-container" id="video-container">
                    <video id="video-stream" autoplay playsinline muted></video>
                    <canvas id="render-canvas"></canvas>
                    
                    <!-- HUD Overlays -->
                    <div id="hud-metrics" class="hud-panel">
                        <div class="metric"><span class="label">Faces:</span> <span id="metric-faces">0</span></div>
                        <div class="metric"><span class="label">FPS:</span> <span id="metric-fps">0</span></div>
                        <div class="metric"><span class="label">Latency:</span> <span id="metric-ms">0</span>ms</div>
                    </div>
                </div>
            </div>

            <!-- Right Sidebar: Gallery -->
            <aside class="sidebar glass-panel gallery-sidebar">
                <div class="section-title">Captures</div>
                <div id="gallery-container" class="gallery-grid">
                    <p class="empty-state text-muted">No images captured yet.</p>
                </div>
                <button id="btn-export-all" class="btn-secondary btn-full" style="display: none;">
                    <i data-lucide="download"></i> Export All
                </button>
            </aside>
        </main>
        
        <!-- Toast Notification Container -->
        <div id="toast-container"></div>
    </div>
    
    <script type="module" src="/src/main.js"></script>
</body>
</html>
